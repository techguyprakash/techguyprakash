<svg width="100%" viewBox="0 0 680 200" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>GitHub Profile Banner - Prakash</title>
  <desc>Dark banner with wave pattern, code icon, tagline Build Break Learn Repeat, and name Prakash</desc>

  <defs>
    <style>
      .float { animation: float 3.5s ease-in-out infinite; }
      @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-7px)} }
      .blink { animation: blink 1.2s step-end infinite; }
      @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
    </style>

    <pattern id="waves" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <rect width="40" height="40" fill="#1e3a5f"/>
      <path d="M0 20 Q5 12 10 20 Q15 28 20 20 Q25 12 30 20 Q35 28 40 20" fill="none" stroke="#2a4f7a" stroke-width="1.2"/>
      <path d="M0 30 Q5 22 10 30 Q15 38 20 30 Q25 22 30 30 Q35 38 40 30" fill="none" stroke="#2a4f7a" stroke-width="1.2"/>
      <path d="M0 10 Q5 2 10 10 Q15 18 20 10 Q25 2 30 10 Q35 18 40 10" fill="none" stroke="#2a4f7a" stroke-width="1.2"/>
      <path d="M0 40 Q5 32 10 40 Q15 48 20 40 Q25 32 30 40 Q35 48 40 40" fill="none" stroke="#2a4f7a" stroke-width="1.2"/>
      <path d="M-10 25 Q-5 17 0 25 Q5 33 10 25 Q15 17 20 25 Q25 33 30 25 Q35 17 40 25 Q45 33 50 25" fill="none" stroke="#2a4f7a" stroke-width="1.2"/>
    </pattern>

    <clipPath id="banner-clip">
      <rect width="680" height="200" rx="12"/>
    </clipPath>
  </defs>

  <rect width="680" height="200" rx="12" fill="url(#waves)" clip-path="url(#banner-clip)"/>
  <rect width="680" height="200" rx="12" fill="#0f2744" opacity="0.35"/>

  <g class="float">
    <rect x="30" y="42" width="110" height="110" rx="14" fill="#2d1b6b" stroke="#6a3fcb" stroke-width="1.5"/>
    <rect x="38" y="50" width="94" height="14" rx="4" fill="#1a0f3a"/>
    <circle cx="48" cy="57" r="3" fill="#e05c5c"/>
    <circle cx="58" cy="57" r="3" fill="#e0b85c"/>
    <circle cx="68" cy="57" r="3" fill="#5ce07a"/>
    <rect x="38" y="68" width="94" height="72" rx="3" fill="#120b2e"/>
    <rect x="44" y="75" width="30" height="5" rx="2" fill="#e040fb"/>
    <rect x="78" y="75" width="18" height="5" rx="2" fill="#64b5f6"/>
    <rect x="44" y="85" width="20" height="5" rx="2" fill="#69f0ae"/>
    <rect x="68" y="85" width="28" height="5" rx="2" fill="#ff8a65"/>
    <rect x="44" y="95" width="14" height="5" rx="2" fill="#64b5f6"/>
    <rect x="62" y="95" width="36" height="5" rx="2" fill="#e040fb"/>
    <rect x="44" y="105" width="50" height="5" rx="2" fill="#69f0ae"/>
    <rect x="44" y="115" width="22" height="5" rx="2" fill="#ff8a65"/>
    <rect x="70" y="115" width="14" height="5" rx="2" fill="#64b5f6"/>
    <rect x="44" y="125" width="6" height="8" rx="1" fill="#e040fb" class="blink"/>
    <rect x="77" y="152" width="6" height="10" rx="2" fill="#2d1b6b"/>
    <rect x="65" y="160" width="30" height="5" rx="2" fill="#2d1b6b"/>
  </g>

  <text x="370" y="85" text-anchor="middle"
    style="font-family:'Georgia',serif; font-size:36px; font-weight:700; fill:#e8eaf6; letter-spacing:1px;">
    Build. Break.
  </text>
  <text x="370" y="128" text-anchor="middle"
    style="font-family:'Georgia',serif; font-size:36px; font-weight:700; fill:#e8eaf6; letter-spacing:1px;">
    Learn. Repeat.
  </text>

  <line x1="240" y1="145" x2="500" y2="145" stroke="#6a3fcb" stroke-width="1" opacity="0.7"/>

  <text x="370" y="163" text-anchor="middle"
    style="font-family:'Georgia',serif; font-size:13px; fill:#b39ddb; letter-spacing:2px;">
    Problem Solver  |  Builder
  </text>

  <text x="600" y="178" text-anchor="middle"
    style="font-family:'Georgia',serif; font-size:14px; fill:#f48fb1;">
    ♥ Prakash
  </text>

  <rect x="0" y="0" width="6" height="200" rx="0" fill="#6a3fcb" opacity="0.8"/>
  <rect x="0" y="194" width="680" height="6" rx="0" fill="#6a3fcb" opacity="0.4"/>

  <circle cx="210" cy="30" r="1.5" fill="#b39ddb" opacity="0.7"/>
  <circle cx="440" cy="170" r="1.5" fill="#b39ddb" opacity="0.5"/>
  <circle cx="620" cy="40" r="2" fill="#e040fb" opacity="0.4"/>
  <circle cx="170" cy="170" r="1.5" fill="#64b5f6" opacity="0.5"/>
</svg>
