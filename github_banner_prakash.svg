  <!-- Main tagline -->
  <text x="370" y="85" text-anchor="middle" style="font-family:'Georgia',serif; font-size:36px; font-weight:700; fill:#e8eaf6; letter-spacing:1px;;fill:rgb(232, 234, 246);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Georgia, serif;font-size:36px;font-weight:700;text-anchor:middle;dominant-baseline:auto">
    Build. Break.
  </text>
  <text x="370" y="128" text-anchor="middle" style="font-family:'Georgia',serif; font-size:36px; font-weight:700; fill:#e8eaf6; letter-spacing:1px;;fill:rgb(232, 234, 246);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Georgia, serif;font-size:36px;font-weight:700;text-anchor:middle;dominant-baseline:auto">
    Learn. Repeat.
  </text>

  <!-- Divider line -->
  <line x1="240" y1="145" x2="500" y2="145" stroke="#6a3fcb" stroke-width="1" opacity="0.7" style="fill:rgb(0, 0, 0);stroke:rgb(106, 63, 203);color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.7;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

