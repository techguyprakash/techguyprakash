<svg width="100%" viewBox="0 0 690 210" role="img" xmlns="http://www.w3.org/2000/svg" style="">
  <title style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">GitHub Profile Banner - Prakash</title>
  <desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Dark banner with wave pattern, code icon, tagline Build Break Learn Repeat, and name Prakash</desc>

  <defs>
    

    <!-- Wave pattern tile -->
    <pattern id="waves" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <rect width="40" height="40" fill="#1e3a5f"/>
      <path d="M0 20 Q5 12 10 20 Q15 28 20 20 Q25 12 30 20 Q35 28 40 20" fill="none" stroke="#2a4f7a" stroke-width="1.2"/>
      <path d="M0 30 Q5 22 10 30 Q15 38 20 30 Q25 22 30 30 Q35 38 40 30" fill="none" stroke="#2a4f7a" stroke-width="1.2"/>
      <path d="M0 10 Q5 2 10 10 Q15 18 20 10 Q25 2 30 10 Q35 18 40 10" fill="none" stroke="#2a4f7a" stroke-width="1.2"/>
      <path d="M0 40 Q5 32 10 40 Q15 48 20 40 Q25 32 30 40 Q35 48 40 40" fill="none" stroke="#2a4f7a" stroke-width="1.2"/>
      <path d="M-10 25 Q-5 17 0 25 Q5 33 10 25 Q15 17 20 25 Q25 33 30 25 Q35 17 40 25 Q45 33 50 25" fill="none" stroke="#2a4f7a" stroke-width="1.2"/>
    </pattern>

    <clipPath id="banner-clip">
      <rect width="680" height="200" rx="12"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="680" height="200" rx="12" fill="url(#waves)" clip-path="url(#banner-clip)" style="stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <!-- Subtle overlay for depth -->
  <rect width="680" height="200" rx="12" fill="#0f2744" opacity="0.35" style="fill:rgb(15, 39, 68);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.35;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

