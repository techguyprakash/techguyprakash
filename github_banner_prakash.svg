  <text x="370" y="163" text-anchor="middle" style="font-family:'Georgia',serif; font-size:13px; fill:#b39ddb; letter-spacing:2px;;fill:rgb(179, 157, 219);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Georgia, serif;font-size:13px;font-weight:400;text-anchor:middle;dominant-baseline:auto">
    Problem Solver  |  Builder
