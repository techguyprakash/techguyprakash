  <!-- Heart + name bottom right -->
  <text x="600" y="178" text-anchor="middle" style="font-family:'Georgia',serif; font-size:14px; fill:#f48fb1;;fill:rgb(244, 143, 177);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Georgia, serif;font-size:14px;font-weight:400;text-anchor:middle;dominant-baseline:auto">
